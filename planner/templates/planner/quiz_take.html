{% extends 'planner/base.html' %}
{% block content %}

<style>
    .option-label {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.02);
        padding: 14px 18px;
        border-radius: 10px;
        border: 1px solid var(--card-border);
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
    }

    .option-label:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateX(4px);
    }

    .option-label.selected {
        border-color: var(--secondary);
        background: rgba(99, 102, 241, 0.1) !important;
        box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
</style>

<div style="max-width: 700px; margin: 0 auto;">
    <h1>📝 Active Quiz</h1>
    <p class="subtitle">Subject: <span style="color: var(--secondary-hover); font-weight: 600;">{{ quiz.subject.name }}</span> {% if quiz.topic %}(Topic: {{ quiz.topic }}){% endif %}</p>

    <form method="POST">
        {% csrf_token %}
        {% for q in questions %}
        <div class="card" style="margin-bottom: 24px;">
            <h3 style="font-size: 18px; margin-bottom: 18px; line-height: 1.5; color: var(--text-main);">
                <span style="color: var(--secondary-hover); font-weight: 700; margin-right: 4px;">Q{{ forloop.counter }}:</span> {{ q.question_text }}
            </h3>
            
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label class="option-label">
                    <input type="radio" name="question_{{ q.id }}" value="A" required style="width: auto; margin-bottom: 0; cursor: pointer;">
                    <span style="font-weight: 600; color: var(--secondary-hover); margin-right: 4px;">A.</span> {{ q.option_a }}
                </label>
                
                <label class="option-label">
                    <input type="radio" name="question_{{ q.id }}" value="B" required style="width: auto; margin-bottom: 0; cursor: pointer;">
                    <span style="font-weight: 600; color: var(--secondary-hover); margin-right: 4px;">B.</span> {{ q.option_b }}
                </label>
                
                <label class="option-label">
                    <input type="radio" name="question_{{ q.id }}" value="C" required style="width: auto; margin-bottom: 0; cursor: pointer;">
                    <span style="font-weight: 600; color: var(--secondary-hover); margin-right: 4px;">C.</span> {{ q.option_c }}
                </label>
                
                <label class="option-label">
                    <input type="radio" name="question_{{ q.id }}" value="D" required style="width: auto; margin-bottom: 0; cursor: pointer;">
                    <span style="font-weight: 600; color: var(--secondary-hover); margin-right: 4px;">D.</span> {{ q.option_d }}
                </label>
            </div>
        </div>
        {% endfor %}
        
        <div style="display: flex; gap: 12px; margin-top: 24px;">
            <button type="submit" class="btn">Submit Quiz Answers</button>
            <a href="{% url 'quiz_me' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    // Add dynamic hover/active class to selected radio option containers
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const name = this.getAttribute('name');
            // Remove active styling from all labels in this question block
            document.querySelectorAll(`input[name="${name}"]`).forEach(sibling => {
                sibling.closest('label').classList.remove('selected');
            });
            // Add active styling to selected label
            if (this.checked) {
                this.closest('label').classList.add('selected');
            }
        });
    });
</script>

{% endblock %}
